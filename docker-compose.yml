version: "3.9"

services:

  db:
    image: postgres:16
    container_name: dimdim-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dimdim-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dimdim-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/appdb
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - dimdim-network
    command: >
      sh -c "
      npx prisma migrate deploy &&
      npm start
      "

networks:
  dimdim-network:

volumes:
  postgres_data: